header:
  version: 1

repos:
  meta-myproject:
    path: .

  bitbake:
    url: https://git.openembedded.org/bitbake
    branch: "2.16"
    layers:
      bitbake: disabled

  openembedded-core:
    url: https://git.openembedded.org/openembedded-core
    branch: whinlatter
    layers:
      meta:

  meta-yocto:
    url: https://git.yoctoproject.org/meta-yocto
    branch: whinlatter
    path: meta-poky
    layers:
      meta-poky:
      meta-yocto-bsp: disabled

  meta-raspberrypi:
    url: https://git.yoctoproject.org/meta-raspberrypi
    branch: master

  meta-openembedded:
    url: https://git.openembedded.org/meta-openembedded
    branch: whinlatter
    layers:
      meta-oe:

machine: raspberrypi0-2w-dev
distro: poky
target:
  - my-image

local_conf_header:
  openssh: |
    IMAGE_INSTALL:append = " openssh"
  remove-bt-wifi: |
    DISTRO_FEATURES:remove = " bluetooth wifi"
